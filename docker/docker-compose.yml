services:
  # ─────────────────────────────────────────────
  # Heron Agent (one-shot query)
  #   docker compose -f docker/docker-compose.yml run --rm heron-agent -m "Hello"
  # ─────────────────────────────────────────────
  heron-agent:
    image: docker.io/sipeed/heron:latest
    container_name: heron-agent
    profiles:
      - agent
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.heron
    entrypoint: ["heron", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # Heron Gateway (Long-running Bot)
  #   docker compose -f docker/docker-compose.yml --profile gateway up
  # ─────────────────────────────────────────────
  heron-gateway:
    image: docker.io/sipeed/heron:latest
    container_name: heron-gateway
    restart: on-failure
    profiles:
      - gateway
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.heron

  # ─────────────────────────────────────────────
  # Heron Launcher (Web Console + Gateway)
  #   docker compose -f docker/docker-compose.yml --profile launcher up
  # ─────────────────────────────────────────────
  heron-launcher:
    image: docker.io/sipeed/heron:launcher
    container_name: heron-launcher
    restart: on-failure
    profiles:
      - launcher
    environment:
      - HERON_GATEWAY_HOST=0.0.0.0
    ports:
      - "127.0.0.1:18800:18800"
      - "127.0.0.1:18790:18790"
    volumes:
      - ./data:/root/.heron
