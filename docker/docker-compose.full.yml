services:
  # ─────────────────────────────────────────────
  # Heron Agent (one-shot query) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml run --rm heron-agent -m "Hello"
  # ─────────────────────────────────────────────
  heron-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: heron-agent-full
    profiles:
      - agent
    volumes:
      - ../config/config.json:/root/.heron/config.json:ro
      - heron-workspace:/root/.heron/workspace
      - heron-npm-cache:/root/.npm # npm cache for faster MCP server installs
    entrypoint: ["heron", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # Heron Gateway (Long-running Bot) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml --profile gateway up
  # ─────────────────────────────────────────────
  heron-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: heron-gateway-full
    restart: unless-stopped
    profiles:
      - gateway
    volumes:
      # Configuration file
      - ../config/config.json:/root/.heron/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - heron-workspace:/root/.heron/workspace
      # NPM cache for faster MCP server installs
      - heron-npm-cache:/root/.npm
    command: ["gateway"]

volumes:
  heron-workspace:
  heron-npm-cache: # Cache npm packages to speed up MCP server installations
